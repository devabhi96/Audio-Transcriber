spring.application.name=audio-transcribe

# 1. Use the global base-url property, not the transcription-specific one
spring.ai.openai.base-url=https://api.groq.com/openai

# 2. IMPORTANT: Remove the ${} surrounding your key if it is just a plain string
spring.ai.openai.api-key=gsk_xxxxxxxxxxxxxxxx
# 3. Model and format settings remain correct
spring.ai.openai.audio.transcription.options.model=whisper-large-v3
spring.ai.openai.audio.transcription.options.response-format=json